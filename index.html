      <h1>OnRequest - شريكك التقني لبناء المنتجات الرقمية واطلاقها</h1>
      <p>شركة برمجة في سوريا، نقدم حلول برمجية مخصصة تشمل تصميم تطبيقات موبايل، تطوير تطبيقات ويب، استشارات تقنية، امن
        سيبراني، تحليل بيانات، واتمتة ذكية. نعمل معك كشريك تقني استراتيجي لضمان نجاح مشروعك الرقمي.</p>
  
      <h2>خدماتنا</h2>
      <ul>
        <li><strong>استراتيجية واطلاق المنتج:</strong> نحول فكرتك الى خارطة طريق تنفيذية، من دراسة الجدوى التقنية وحتى خطة
          الذهاب الى السوق.</li>
        <li><strong>تصميم تجربة المستخدم:</strong> نصمم واجهات احترافية. نبني رحلة مستخدم تزيد من التحويلات وتعكس هويتك.
        </li>
        <li><strong>تطبيقات موبايل:</strong> نبني تطبيقات iOS و Android باداء سلس وتجربة مستخدم لا تنسى، مصممة لتدوم
          وتتوسع.</li>
        <li><strong>تطبيقات ويب متكاملة:</strong> نطور منصات ويب قوية وسريعة وامنة. من لوحات التحكم المعقدة الى منصات
          الخدمات، نصنع الحل الكامل.</li>
        <li><strong>برمجيات سطح المكتب:</strong> حلول برمجية مخصصة لانظمة التشغيل المختلفة، نضمن استقرارا واداء عاليا
          لاعمالك الحيوية.</li>
        <li><strong>هندسة قواعد البيانات:</strong> نصمم بنية بيانات عالية الاداء والامان، تضمن استمرارية عملك حتى اعلى
          معدلات النمو والاستخدام.</li>
        <li><strong>تحصين الامن السيبراني:</strong> لا ننتظر الهجوم. نحمي منتجك الرقمي بشكل استباقي ونضمن سلامة بياناتك
          وبيانات عملائك.</li>
        <li><strong>تحليل البيانات:</strong> نحول بياناتك الخام الى رؤى استراتيجية ومخططات تفاعلية، تمنحك وضوحا كاملا
          لاتخاذ القرار.</li>
        <li><strong>اتمتة العمليات الذكية:</strong> نحرر وقت فريقك من المهام المتكررة باتمتة ذكية، ليتفرغوا للابداع
          والنمو.</li>
        <li><strong>استشارات تقنية:</strong> شريك تقني استراتيجي بجانبك. نوفر جلسات استشارية ودراسات تقنية شاملة لحل اصعب
          التحديات.</li>
      </ul>
  
      <h2>اخر اعمالنا</h2>
      <ul>
        <li><strong>GoOrder - نظام ادارة المطاعم:</strong> نظام متكامل لادارة المطاعم من الطلب حتى التوصيل. ادارة فروع،
          تخصيص كامل للمنيو، وتكامل فوري بين اقسام المطبخ وطاقم الخدمة والعملاء، كل ذلك في منصة واحدة.</li>
        <li><strong>Live Dent - نظام رقمي لادارة عيادات الاسنان:</strong> لوحة تحكم واحدة تختصر كل التعقيد: سجل طبي
          الكتروني، جدولة ذكية للمواعيد، وتتبع مالي دقيق. لا اوراق، لا حجوزات مزدوجة، لا مدفوعات ضائعة.</li>
      </ul>
      <p>شركاء في اطلاق وتنمية اكثر من 12 مشروعا في السوق السوري، بين بناء واستشارة وشراكة تنفيذية.</p>
  
      <h2>ما يميزنا</h2>
      <ul>
        <li><strong>نفهم مجالك قبل ان نلمس الكود:</strong> لا نبدا بالتقنية، نبدا بدراسة قطاعك ومنافسيك وعملائك. الحل الذي
          يبنى بفهم عميق يصل الى الهدف من اول مرة.</li>
        <li><strong>سرعة تنفيذ تفوق التوقعات:</strong> نملك منهجيات تطوير رشيقة وخبرة متراكمة تمكننا من تسليم مشروعك في
          وقت قياسي دون المساس بالجودة او الامان.</li>
        <li><strong>اتفاق واضح ومفصل قبل البداية:</strong> قبل ان نكتب اول سطر كود، تتفق معنا على المتطلبات والمميزات

        <li><strong>ابتكار حلول ذكية منخفضة التكلفة:</strong> نبتكر طرقا تقنية منخفضة التكاليف وسريعة التنفيذ لعمليات

        <li><strong>نسلم ما وعدنا به في الوقت المحدد:</strong> نلتزم بالمدة الزمنية والمنتج النهائي كما تم تحديدهما

        <li><strong>دعم فني دائم ومجاني بعد الاطلاق:</strong> لا تنتهي علاقتنا بتسليم المشروع. نقدم دعما فنيا مجانيا

        <li><strong>3 نماذج للتعاون تناسبك:</strong> نوفر خيارات مرنة: تنفيذ مشروعك مقابل اجر، جلسات ودراسات استشارية
          متخصصة، او ندخل معك كشريك تقني تنفيذي.</li>
        <li><strong>امان وموثوقية من اليوم الاول:</strong> نبني منتجك وفق افضل ممارسات الامن السيبراني، ونضمن حماية
